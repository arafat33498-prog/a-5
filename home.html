<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
</head>
<body>
 <nav>
     <div class="navbar bg-base-100 shadow-sm px-12">
  <div class="flex-1 flex items-center gap-2">
 
  <img src="assets/github-logo.png" alt="GitHub Logo" class="h-10 w-auto" />
  <h1 class="text-2xl">GitHub Issues Tracker</h1>
</div>
  <div class="flex gap-2">
    <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
    <div class="dropdown dropdown-end">
      <div tabindex="0" role="button" class="btn btn-ghost btn-circle avatar">
        <div class="w-10 rounded-full">
          <img
            alt="Tailwind CSS Navbar component"
            src="https://img.daisyui.com/images/stock/photo-1534528741775-53994a69daeb.webp" />
        </div>
      </div>
      <ul
        tabindex="-1"
        class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
        <li>
          <a class="justify-between">
            Profile
            <span class="badge">New</span>
          </a>
        </li>
        <li><a>Settings</a></li>
        <li><a>Logout</a></li>
      </ul>
    </div>
  </div>
</div>
 </nav>
    <section>
<div class="bg-white shadow-sm border border-gray-100 rounded-lg p-6">
  <div class="flex gap-3" id="tab-group">
    
    <button  class="btn bg-blue-600 text-white border-none">All</button>
    <button  class="btn bg-gray-100 text-gray-600 border-none">Open</button>
    <button  class="btn bg-gray-100 text-gray-600 border-none">Closed</button>
  </div>
  
  <p class="mt-4 text-sm text-gray-500">Total Issues: <span  class="font-bold">0</span></p>
</div>

<div id="issues-card" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-10">
    
</div>
    </section>
    <script src="script/load.js"></script>
</body>
</html>
